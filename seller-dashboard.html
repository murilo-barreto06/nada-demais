<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Painel do Vendedor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="seller-dashboard.html" class="active">Meu painel</a>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Painel do Vendedor</h1>
    <p>Aqui você gerencia seus modelos, preços e documentação.</p>

    <div class="dashboard-actions">
      <button class="hero-btn" onclick="alert('Mock: abrir form de adicionar modelo')">Adicionar modelo</button>
      <button class="hero-btn outline" onclick="alert('Mock: ver vendas')">Ver vendas</button>
    </div>

    <div class="card-grid" id="sellerCards">
      <!-- mock cards -->
      <div class="small-card">
        <h3>IA Atendimento</h3>
        <p>Vendas: 23</p>
      </div>
      <div class="small-card">
        <h3>Classificador</h3>
        <p>Vendas: 5</p>
      </div>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <h3>Configurações</h3>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row">
      <label>Conta</label>
      <a href="login.html" class="small-btn">Entrar / Cadastrar</a>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
