<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Loja</title>
  
  <!-- SCRIPT CRÍTICO ANTES DO CSS - PREVINE FLASH -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos específicos da página de loja */
    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .store-header h1 {
      font-size: 2rem;
      color: var(--text);
    }
    
    /* Barra de pesquisa fixa no canto direito */
    .search-wrapper {
      position: relative;
      width: 280px;
    }
    
    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }
    
    .search-wrapper input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 40px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      transition: all var(--transition);
    }
    
    .search-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(21, 115, 71, 0.1);
    }
    
    /* Abas estilo fichário */
    .type-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(128,128,128,0.2);
      padding-bottom: 1rem;
    }
    
    .type-tab {
      padding: 0.6rem 1.5rem;
      border-radius: 30px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
      font-size: 0.95rem;
    }
    
    .type-tab:hover {
      color: var(--accent);
      background: rgba(21, 115, 71, 0.05);
    }
    
    .type-tab.active {
      background: var(--accent);
      color: white;
    }
    
    .type-tab .count {
      margin-left: 0.3rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    
    /* Feed de conteúdo */
    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* Cards do feed */
    .feed-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid rgba(128,128,128,0.1);
      cursor: pointer;
    }
    
    .feed-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
    }
    
    .card-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      overflow: hidden;
    }
    
    .card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-avatar.professional {
      background: linear-gradient(135deg, #ff6b6b, #feca57);
    }
    
    .card-author {
      flex: 1;
    }
    
    .card-author h3 {
      font-size: 1.2rem;
      margin-bottom: 0.2rem;
      color: var(--text);
    }
    
    .card-author .card-type {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .card-type-icon {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--accent);
      display: inline-block;
    }
    
    .card-type-icon.professional {
      background: #ff6b6b;
    }
    
    .card-image {
      width: 100%;
      height: 280px;
      background-size: cover;
      background-position: center;
      background-color: #2d5a7a;
      margin: 0.5rem 0;
    }
    
    .card-content {
      padding: 1rem 1.5rem 1.5rem;
    }
    
    .card-title {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .card-description {
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    
    .card-meta {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(128,128,128,0.1);
      border-bottom: 1px solid rgba(128,128,128,0.1);
    }
    
    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .card-meta-item i {
      color: var(--accent);
    }
    
    .card-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .card-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.9rem;
    }
    
    .card-btn.primary {
      background: var(--accent);
      color: white;
    }
    
    .card-btn.primary:hover {
      background: var(--accent-hover);
    }
    
    .card-btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .card-btn.outline:hover {
      background: var(--accent);
      color: white;
    }
    
    /* Loading skeleton */
    .skeleton-card {
      background: var(--card);
      border-radius: 20px;
      padding: 1.5rem;
    }
    
    .skeleton-line {
      height: 20px;
      background: linear-gradient(90deg, var(--bg) 25%, var(--panel) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Empty state */
    .empty-feed {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--panel);
      border-radius: var(--border-radius);
      color: var(--muted);
    }
    
    .empty-feed i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-feed h3 {
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .empty-feed p {
      margin-bottom: 2rem;
    }
    
    /* Responsividade */
    @media (max-width: 768px) {
      .store-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .search-wrapper {
        width: 100%;
      }
      
      .type-tabs {
        flex-wrap: wrap;
      }
      
      .card-header {
        flex-direction: column;
        text-align: center;
      }
      
      .card-meta {
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }
      
      .card-actions {
        flex-direction: column;
      }
    }
    
    @media (max-width: 480px) {
      .card-title {
        font-size: 1.2rem;
      }
      
      .card-image {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main>
    <div class="container">
      <!-- Cabeçalho com título e pesquisa -->
      <div class="store-header">
        <h1>Explorar</h1>
        <div class="search-wrapper">
          <i>🔍</i>
          <input type="text" id="searchInput" placeholder="Pesquisar modelos ou profissionais..." oninput="filterItems()">
        </div>
      </div>
      
      <!-- Abas de filtro -->
      <div class="type-tabs">
        <button class="type-tab active" onclick="filterByType('all')" id="tabAll">
          Todos <span class="count" id="countAll">0</span>
        </button>
        <button class="type-tab" onclick="filterByType('model')" id="tabModels">
           Modelos <span class="count" id="countModels">0</span>
        </button>
        <button class="type-tab" onclick="filterByType('professional')" id="tabProfessionals">
           Profissionais <span class="count" id="countProfessionals">0</span>
        </button>
      </div>
      
      <!-- Feed de conteúdo -->
      <div class="feed-container" id="feedContainer">
        <!-- Loading skeleton -->
        <div class="skeleton-card">
          <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
          <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
          <div class="skeleton-line" style="width: 40%;"></div>
          <div class="skeleton-line" style="width: 70%;"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
          <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
          <div class="skeleton-line" style="width: 40%;"></div>
          <div class="skeleton-line" style="width: 70%;"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row">
      <label>Conta</label>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  
  <script>
    // ===== VARIÁVEIS GLOBAIS =====
    let allItems = [];
    let filteredItems = [];
    let currentFilter = 'all';
    let currentSearch = '';
    
    // ===== FUNÇÕES DE CARREGAMENTO =====
    async function loadAllItems() {
      showSkeleton();
      
      try {
        const models = JSON.parse(localStorage.getItem('models') || '[]');
        const professionals = JSON.parse(localStorage.getItem('professionals') || '[]');
        
        const modelItems = models.map(model => ({
          id: model.id,
          type: 'model',
          title: model.title,
          name: model.seller || 'Vendedor',
          description: model.description,
          image: model.image,
          price: model.price,
          seller: model.seller,
          rating: 4.5,
          projects: Math.floor(Math.random() * 50) + 10,
          createdAt: model.createdAt || new Date().toISOString()
        }));
        
        const professionalItems = professionals.map(prof => ({
          id: prof.id,
          type: 'professional',
          title: prof.name,
          name: prof.name,
          specialty: prof.specialty,
          description: prof.bio || `${prof.name} é especialista em ${prof.specialty}`,
          image: prof.avatar,
          rating: prof.rating || 5.0,
          projects: prof.projects || 0,
          hourlyRate: prof.hourlyRate,
          createdAt: prof.createdAt || new Date().toISOString()
        }));
        
        allItems = [...modelItems, ...professionalItems].sort((a, b) => 
          new Date(b.createdAt) - new Date(a.createdAt)
        );
        
        updateCounts(modelItems.length, professionalItems.length);
        filterItems();
        
      } catch (error) {
        console.error('Erro:', error);
        showEmptyState('Erro ao carregar dados');
      }
    }
    
    function updateCounts(modelsCount, professionalsCount) {
      document.getElementById('countAll').textContent = allItems.length;
      document.getElementById('countModels').textContent = modelsCount;
      document.getElementById('countProfessionals').textContent = professionalsCount;
    }
    
    function showSkeleton() {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      let skeletonHTML = '';
      for (let i = 0; i < 2; i++) {
        skeletonHTML += `
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
            <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
            <div class="skeleton-line" style="width: 70%;"></div>
          </div>
        `;
      }
      container.innerHTML = skeletonHTML;
    }
    
    function showEmptyState(message) {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      container.innerHTML = `
        <div class="empty-feed">
          <i>🔍</i>
          <h3>Nada por aqui</h3>
          <p>${message}</p>
          <a href="anuncie.html" class="cta" style="display: inline-block; margin-top: 1rem;">Publicar algo</a>
        </div>
      `;
    }
    
    // ===== FUNÇÕES DE FILTRO =====
    window.filterItems = function() {
      currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
      
      filteredItems = allItems.filter(item => {
        if (currentFilter !== 'all' && item.type !== currentFilter) return false;
        
        if (currentSearch) {
          const searchText = `${item.title} ${item.name} ${item.description}`.toLowerCase();
          return searchText.includes(currentSearch);
        }
        
        return true;
      });
      
      renderItems(filteredItems);
    };
    
    window.filterByType = function(type) {
      currentFilter = type;
      
      document.getElementById('tabAll').classList.toggle('active', type === 'all');
      document.getElementById('tabModels').classList.toggle('active', type === 'model');
      document.getElementById('tabProfessionals').classList.toggle('active', type === 'professional');
      
      filterItems();
    };
    
    // ===== FUNÇÕES DE RENDERIZAÇÃO =====
    function renderItems(items) {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      if (items.length === 0) {
        showEmptyState('Nenhum resultado encontrado');
        return;
      }
      
      container.innerHTML = '';
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.onclick = () => abrirItem(item);
        
        if (item.type === 'model') {
          card.innerHTML = renderModelCard(item);
        } else {
          card.innerHTML = renderProfessionalCard(item);
        }
        
        container.appendChild(card);
      });
    }
    
    function renderModelCard(model) {
      const imageStyle = model.image ? `background-image: url('${model.image}')` : 'background: linear-gradient(135deg, var(--accent), #4ade80)';
      const avatarInitial = model.name ? model.name.charAt(0).toUpperCase() : 'M';
      
      return `
        <div class="card-header">
          <div class="card-avatar" style="${model.image ? `background-image: url('${model.image}'); background-size: cover;` : ''}">
            ${!model.image ? avatarInitial : ''}
          </div>
          <div class="card-author">
            <h3>${model.name}</h3>
            <div class="card-type">
              <span class="card-type-icon"></span>
              Modelo de IA
            </div>
          </div>
        </div>
        <div class="card-image" style="${imageStyle}"></div>
        <div class="card-content">
          <h2 class="card-title">${model.title}</h2>
          <p class="card-description">${model.description.substring(0, 150)}${model.description.length > 150 ? '...' : ''}</p>
          
          <div class="card-meta">
            <div class="card-meta-item"> ${model.price || 'Consultar'}</div>
            <div class="card-meta-item"> ${model.rating.toFixed(1)}</div>
            <div class="card-meta-item"> ${model.projects} vendas</div>
          </div>
          
          <div class="card-actions">
            <button class="card-btn primary" onclick="event.stopPropagation(); window.location.href='model.html?id=${model.id}'">Ver detalhes</button>
            <button class="card-btn outline" onclick="event.stopPropagation(); alert('Contatar vendedor')">Contatar</button>
          </div>
        </div>
      `;
    }
    
    function renderProfessionalCard(prof) {
      const imageStyle = prof.image ? `background-image: url('${prof.image}')` : 'background: linear-gradient(135deg, #ff6b6b, #feca57)';
      const avatarInitial = prof.name ? prof.name.charAt(0).toUpperCase() : 'P';
      
      return `
        <div class="card-header">
          <div class="card-avatar professional" style="${prof.image ? `background-image: url('${prof.image}'); background-size: cover;` : ''}">
            ${!prof.image ? avatarInitial : ''}
          </div>
          <div class="card-author">
            <h3>${prof.name}</h3>
            <div class="card-type">
              <span class="card-type-icon professional"></span>
              Profissional
            </div>
          </div>
        </div>
        <div class="card-image" style="${imageStyle}"></div>
        <div class="card-content">
          <h2 class="card-title">${prof.specialty || 'Especialista'}</h2>
          <p class="card-description">${prof.description.substring(0, 150)}${prof.description.length > 150 ? '...' : ''}</p>
          
          <div class="card-meta">
            <div class="card-meta-item">⏱ ${prof.hourlyRate ? `R$ ${prof.hourlyRate}/h` : 'Consultar'}</div>
            <div class="card-meta-item"> ${prof.rating.toFixed(1)}</div>
            <div class="card-meta-item"> ${prof.projects} projetos</div>
          </div>
          
          <div class="card-actions">
            <button class="card-btn primary" onclick="event.stopPropagation(); window.location.href='professional.html?id=${prof.id}'">Ver perfil</button>
            <button class="card-btn outline" onclick="event.stopPropagation(); alert('Contatar profissional')">Contatar</button>
          </div>
        </div>
      `;
    }
    
    function abrirItem(item) {
      if (item.type === 'model') {
        window.location.href = `model.html?id=${item.id}`;
      } else {
        window.location.href = `professional.html?id=${item.id}`;
      }
    }
    
    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
      loadAllItems();
    });
  </script>
</body>
</html>
