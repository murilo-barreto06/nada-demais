<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Loja</title>
  
  <!-- SCRIPT CRÍTICO ANTES DO CSS - PREVINE FLASH -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos específicos da página de loja */
    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .store-header h1 {
      font-size: 2rem;
      color: var(--text);
    }
    
    .search-wrapper {
      position: relative;
      width: 280px;
    }
    
    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }
    
    .search-wrapper input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 40px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      transition: all var(--transition);
    }
    
    .search-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(21, 115, 71, 0.1);
    }
    
    .type-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(128,128,128,0.2);
      padding-bottom: 1rem;
    }
    
    .type-tab {
      padding: 0.6rem 1.5rem;
      border-radius: 30px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
      font-size: 0.95rem;
    }
    
    .type-tab:hover {
      color: var(--accent);
      background: rgba(21, 115, 71, 0.05);
    }
    
    .type-tab.active {
      background: var(--accent);
      color: white;
    }
    
    .type-tab .count {
      margin-left: 0.3rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    
    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .feed-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid rgba(128,128,128,0.1);
      cursor: pointer;
    }
    
    .feed-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
    }
    
    .card-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-avatar.professional {
      background: linear-gradient(135deg, #ff6b6b, #feca57);
    }
    
    .card-author {
      flex: 1;
    }
    
    .card-author h3 {
      font-size: 1.2rem;
      margin-bottom: 0.2rem;
      color: var(--text);
    }
    
    .card-author .card-type {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .card-type-icon {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--accent);
      display: inline-block;
    }
    
    .card-type-icon.professional {
      background: #ff6b6b;
    }
    
    .card-media-preview {
      margin: 0.5rem 1rem;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
    }
    
    .card-media-preview img,
    .card-media-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-content {
      padding: 0.5rem 1.5rem 1.5rem;
    }
    
    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text);
    }
    
    .card-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }
    
    .card-description {
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.5;
      font-size: 0.9rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(128,128,128,0.1);
      border-bottom: 1px solid rgba(128,128,128,0.1);
      flex-wrap: wrap;
    }
    
    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text);
      font-size: 0.85rem;
    }
    
    .card-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .card-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.9rem;
    }
    
    .card-btn.primary {
      background: var(--accent);
      color: white;
    }
    
    .card-btn.primary:hover {
      background: var(--accent-hover);
    }
    
    .card-btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .card-btn.outline:hover {
      background: var(--accent);
      color: white;
    }
    
    .skeleton-card {
      background: var(--card);
      border-radius: 20px;
      padding: 1.5rem;
    }
    
    .skeleton-line {
      height: 20px;
      background: linear-gradient(90deg, var(--bg) 25%, var(--panel) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .empty-feed {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--panel);
      border-radius: var(--border-radius);
      color: var(--muted);
    }
    
    .empty-feed i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    @media (max-width: 768px) {
      .store-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .search-wrapper {
        width: 100%;
      }
      .type-tabs {
        flex-wrap: wrap;
      }
      .card-header {
        flex-direction: column;
        text-align: center;
      }
      .card-meta {
        flex-direction: column;
        align-items: center;
      }
      .card-actions {
        flex-direction: column;
      }
    }
    
    /* ===== MINI CAROUSEL IN CARDS ===== */
    .card-media-carousel {
      position: relative;
      margin: 0.5rem 1rem;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
    }
    .mini-track {
      display: flex;
      height: 100%;
      transition: transform 0.3s ease;
    }
    .mini-slide {
      flex: 0 0 100%;
      height: 100%;
    }
    .mini-slide img, .mini-slide video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .mini-ctrl {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.5);
      color: white; border: none;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 4; transition: background .15s;
    }
    .mini-ctrl:hover { background: rgba(0,0,0,.75); }
    .mini-ctrl.p { left: 7px; }
    .mini-ctrl.n { right: 7px; }
    .mini-count-badge {
      position: absolute;
      bottom: 7px; right: 10px;
      background: rgba(0,0,0,.55);
      color: white; border-radius: 20px;
      padding: 2px 8px; font-size: .72rem;
      z-index: 4;
    }
    @media (max-width: 480px) {
      .card-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="store-header">
        <h1>Explorar</h1>
        <div class="search-wrapper">
          <i>🔍</i>
          <input type="text" id="searchInput" placeholder="Pesquisar modelos ou profissionais..." oninput="filterItems()">
        </div>
      </div>
      
      <div class="type-tabs">
        <button class="type-tab active" onclick="filterByType('all')" id="tabAll">
          Todos <span class="count" id="countAll">0</span>
        </button>
        <button class="type-tab" onclick="filterByType('model')" id="tabModels">
          Modelos <span class="count" id="countModels">0</span>
        </button>
        <button class="type-tab" onclick="filterByType('professional')" id="tabProfessionals">
          Profissionais <span class="count" id="countProfessionals">0</span>
        </button>
      </div>
      
      <div class="feed-container" id="feedContainer">
        <div class="skeleton-card">
          <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
          <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
          <div class="skeleton-line" style="width: 40%;"></div>
          <div class="skeleton-line" style="width: 70%;"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row">
      <label>Conta</label>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  
  <script>
    let allItems = [];
    let currentFilter = 'all';
    let currentSearch = '';

    function getUserAvatar(userId) {
      if (!userId) return null;
      
      // Tenta pegar do localStorage específico
      let avatar = localStorage.getItem(`avatar_${userId}`);
      if (avatar) return avatar;
      
      // Tenta pegar do array de usuários
      const users = JSON.parse(localStorage.getItem('ai_store_users') || '[]');
      const user = users.find(u => u.id == userId);
      if (user && user.avatar) return user.avatar;
      
      return null;
    }
    
    async function loadAllItems() {
      showSkeleton();
      
      try {
        const models = JSON.parse(localStorage.getItem('models') || '[]');
        const professionals = JSON.parse(localStorage.getItem('professionals') || '[]');
        
        const modelItems = models.map(model => ({
          ...model,
          type: 'model',
          profileName: model.profile?.name || model.seller || 'Vendedor',
          profileAvatar: model.profile?.avatar || getUserAvatar(model.profile?.userId),  
          // Usa os dados do perfil se existirem, senão usa os dados do modelo
          previewMedia: model.media?.[0]?.data || model.image,
          mediaCount: model.media?.length || 0,
          portfolioLink: model.portfolioLink
        }));
        
        const professionalItems = professionals.map(prof => ({
          ...prof,
          type: 'professional',
          profileName: prof.profile?.name || prof.name,
          profileAvatar: prof.profile?.avatar || getUserAvatar(prof.profile?.userId),
          // Usa os dados do perfil se existirem, senão usa os dados do profissional
          previewMedia: prof.media?.[0]?.data || prof.avatar,
          mediaCount: prof.media?.length || 0,
          portfolioLink: prof.portfolioLink,
          price: prof.hourlyRate ? `R$ ${prof.hourlyRate}/h` : null
        }));
        
        allItems = [...modelItems, ...professionalItems].sort((a, b) => 
          new Date(b.createdAt) - new Date(a.createdAt)
        );
        
        updateCounts();
        filterItems();
        
      } catch (error) {
        console.error('Erro:', error);
        showEmptyState('Erro ao carregar dados');
      }
    }
    
    function updateCounts() {
      const modelsCount = allItems.filter(i => i.type === 'model').length;
      const professionalsCount = allItems.filter(i => i.type === 'professional').length;
      document.getElementById('countAll').textContent = allItems.length;
      document.getElementById('countModels').textContent = modelsCount;
      document.getElementById('countProfessionals').textContent = professionalsCount;
    }
    
    function showSkeleton() {
      const container = document.getElementById('feedContainer');
      if (container) {
        container.innerHTML = '<div class="skeleton-card"><div class="skeleton-line" style="width: 60%; height: 30px;"></div><div class="skeleton-line" style="width: 90%; height: 200px;"></div><div class="skeleton-line" style="width: 40%;"></div><div class="skeleton-line" style="width: 70%;"></div></div>';
      }
    }
    
    function showEmptyState(message) {
      const container = document.getElementById('feedContainer');
      if (container) {
        container.innerHTML = `<div class="empty-feed"><i>🔍</i><h3>Nada por aqui</h3><p>${message}</p><a href="anuncie.html" class="cta">Publicar algo</a></div>`;
      }
    }
    
    window.filterItems = function() {
      currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
      
      const filtered = allItems.filter(item => {
        if (currentFilter !== 'all' && item.type !== currentFilter) return false;
        if (currentSearch) {
          const searchText = `${item.title || ''} ${item.profileName || ''} ${item.description || ''} ${item.specialty || ''}`.toLowerCase();
          return searchText.includes(currentSearch);
        }
        return true;
      });
      
      renderItems(filtered);
    };
    
    window.filterByType = function(type) {
      currentFilter = type;
      document.getElementById('tabAll').classList.toggle('active', type === 'all');
      document.getElementById('tabModels').classList.toggle('active', type === 'model');
      document.getElementById('tabProfessionals').classList.toggle('active', type === 'professional');
      filterItems();
    };
    
    // ===== MINI CAROUSEL STATE (per card by index) =====
    const miniCarState = {};
    window.miniSlide = function(cardIdx, dir, mediaCount, ev) {
      if (ev) ev.stopPropagation();
      const cur = miniCarState[cardIdx] || 0;
      const next = (cur + dir + mediaCount) % mediaCount;
      miniCarState[cardIdx] = next;
      const track = document.getElementById(`mtrack-${cardIdx}`);
      if (track) track.style.transform = `translateX(-${next*100}%)`;
      const badge = document.getElementById(`mbadge-${cardIdx}`);
      if (badge) badge.textContent = `${next+1}/${mediaCount}`;
    };

    function buildMiniCarousel(media, cardIdx) {
      if (!media || media.length === 0) return '';
      miniCarState[cardIdx] = 0;
      const slides = media.map(m =>
        `<div class="mini-slide">${m.type==='video'
          ? `<video src="${m.data}" muted playsinline style="width:100%;height:100%;object-fit:cover;"></video>`
          : `<img src="${m.data}" alt="">`}</div>`
      ).join('');
      const arrows = media.length > 1 ? `
        <button class="mini-ctrl p" onclick="miniSlide(${cardIdx},-1,${media.length},event)">‹</button>
        <button class="mini-ctrl n" onclick="miniSlide(${cardIdx},1,${media.length},event)">›</button>
        <div class="mini-count-badge" id="mbadge-${cardIdx}">1/${media.length}</div>` : '';
      return `<div class="card-media-carousel">
        <div class="mini-track" id="mtrack-${cardIdx}">${slides}</div>
        ${arrows}
      </div>`;
    }

    function renderItems(items) {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      if (items.length === 0) {
        showEmptyState('Nenhum resultado encontrado');
        return;
      }
      
      container.innerHTML = '';
      
      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.onclick = () => { window.location.href = `${item.type}.html?id=${item.id}`; };
        
        const profileName = item.profileName;
        const profileAvatar = item.profileAvatar;
        const avatarInitial = profileName?.charAt(0).toUpperCase() || '?';
        
        // Build media for carousel
        const mediaArr = item.media || (item.previewMedia ? [{type:'image',data:item.previewMedia}] : []);
        const mediaSection = buildMiniCarousel(mediaArr, idx);
        
        card.innerHTML = `
          <div class="card-header">
            <div class="card-avatar ${item.type === 'professional' ? 'professional' : ''}">
              ${profileAvatar ? `<img src="${profileAvatar}" alt="Avatar">` : avatarInitial}
            </div>
            <div class="card-author">
              <h3>${profileName}</h3>
              <div class="card-type">
                <span class="card-type-icon ${item.type === 'professional' ? 'professional' : ''}"></span>
                ${item.type === 'model' ? 'Modelo de IA' : 'Profissional'}
              </div>
            </div>
          </div>
          ${mediaSection}
          <div class="card-content">
            <h2 class="card-title">${item.type === 'model' ? item.title : (item.specialty || 'Especialista')}</h2>
            ${item.specialty && item.type === 'model' ? `<div class="card-subtitle">${item.specialty}</div>` : ''}
            ${item.type === 'professional' ? `<div class="card-subtitle">${item.name}</div>` : ''}
            <p class="card-description">${(item.description || item.bio || '').substring(0, 120)}${(item.description || item.bio || '').length > 120 ? '...' : ''}</p>
            <div class="card-meta">
              ${item.price ? `<div class="card-meta-item">${item.price}</div>` : ''}
              ${item.hourlyRate && item.type === 'professional' ? `<div class="card-meta-item">R$ ${item.hourlyRate}/h</div>` : ''}
              ${item.portfolioLink ? `<div class="card-meta-item">🔗 Portfólio</div>` : ''}
            </div>
            <div class="card-actions">
              <button class="card-btn primary" onclick="event.stopPropagation(); window.location.href='${item.type}.html?id=${item.id}'">Ver detalhes</button>
            </div>
          </div>
        `;
        
        container.appendChild(card);
      });
    }
    
    document.addEventListener('DOMContentLoaded', loadAllItems);
  </script>
</body>
</html>
