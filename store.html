<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Loja</title>
  
  <!-- SCRIPT CRÍTICO ANTES DO CSS - PREVINE FLASH -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos específicos da nova página de loja */
    .store-layout {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }
    
    /* Sidebar com filtros */
    .filters-sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 100px;
      height: fit-content;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      padding-right: 1rem;
    }
    
    .filter-section {
      background: var(--panel);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    
    .filter-section h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    /* Abas estilo fichário */
    .type-tabs {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    
    .type-tab {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      border-radius: 30px;
      background: transparent;
      border: 1px solid rgba(128,128,128,0.1);
      color: var(--text);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    
    .type-tab:hover {
      background: rgba(21, 115, 71, 0.05);
      border-color: var(--accent);
    }
    
    .type-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .type-tab i {
      font-size: 1.2rem;
    }
    
    .type-tab .count {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    
    /* Botão de pesquisa flutuante */
    .search-float-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(21, 115, 71, 0.3);
      z-index: 100;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    
    .search-float-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(21, 115, 71, 0.4);
    }
    
    /* Overlay de pesquisa */
    .search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .search-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .search-panel {
      width: 90%;
      max-width: 600px;
      background: var(--panel);
      border-radius: 30px;
      padding: 2rem;
      box-shadow: var(--shadow-hover);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    
    .search-overlay.active .search-panel {
      transform: translateY(0);
    }
    
    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .search-header h2 {
      font-size: 1.5rem;
      color: var(--text);
    }
    
    .close-search {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg);
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    
    .close-search:hover {
      background: var(--accent);
      color: white;
    }
    
    .search-input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .search-input-wrapper i {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1.2rem;
    }
    
    .search-input-wrapper input {
      width: 100%;
      padding: 1rem 1rem 1rem 3.5rem;
      border: 2px solid rgba(128,128,128,0.1);
      border-radius: 50px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      transition: border-color var(--transition);
    }
    
    .search-input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .tags-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-height: 200px;
      overflow-y: auto;
      padding: 0.5rem;
      background: var(--bg);
      border-radius: 20px;
    }
    
    .tag-item {
      padding: 0.4rem 1rem;
      background: transparent;
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 30px;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .tag-item:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .tag-item.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .tag-item.popular::after {
      content: "🔥";
      font-size: 0.8rem;
      margin-left: 0.3rem;
    }
    
    .add-tag {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    
    .add-tag input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 30px;
      background: var(--bg);
      color: var(--text);
    }
    
    .add-tag button {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .add-tag button:hover {
      background: var(--accent-hover);
    }
    
    .search-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .search-actions button {
      flex: 1;
      padding: 0.8rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .btn-outline:hover {
      background: var(--accent);
      color: white;
    }
    
    /* Feed de conteúdo */
    .feed-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* Cards do feed */
    .feed-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid rgba(128,128,128,0.1);
      cursor: pointer;
    }
    
    .feed-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
    }
    
    .card-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      overflow: hidden;
    }
    
    .card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-avatar.professional {
      background: linear-gradient(135deg, #ff6b6b, #feca57);
    }
    
    .card-author {
      flex: 1;
    }
    
    .card-author h3 {
      font-size: 1.2rem;
      margin-bottom: 0.2rem;
      color: var(--text);
    }
    
    .card-author .card-type {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .card-type-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--accent);
      display: inline-block;
    }
    
    .card-type-icon.professional {
      background: #ff6b6b;
    }
    
    .card-image {
      width: 100%;
      height: 300px;
      background-size: cover;
      background-position: center;
      background-color: #2d5a7a;
      margin: 0.5rem 0;
    }
    
    .card-content {
      padding: 1rem 1.5rem 1.5rem;
    }
    
    .card-title {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .card-description {
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    
    .card-meta {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
      border-top: 1px solid rgba(128,128,128,0.1);
      border-bottom: 1px solid rgba(128,128,128,0.1);
    }
    
    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text);
    }
    
    .card-meta-item i {
      color: var(--accent);
    }
    
    .card-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    
    .card-tag {
      padding: 0.2rem 0.8rem;
      background: var(--bg);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    .card-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .card-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .card-btn.primary {
      background: var(--accent);
      color: white;
    }
    
    .card-btn.primary:hover {
      background: var(--accent-hover);
    }
    
    .card-btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .card-btn.outline:hover {
      background: var(--accent);
      color: white;
    }
    
    /* Loading skeleton */
    .skeleton-card {
      background: var(--card);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    
    .skeleton-line {
      height: 20px;
      background: linear-gradient(90deg, var(--bg) 25%, var(--panel) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Empty state */
    .empty-feed {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--panel);
      border-radius: var(--border-radius);
      color: var(--muted);
    }
    
    .empty-feed i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-feed h3 {
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .empty-feed p {
      margin-bottom: 2rem;
    }
    
    /* Responsividade */
    @media (max-width: 900px) {
      .store-layout {
        flex-direction: column;
      }
      
      .filters-sidebar {
        width: 100%;
        position: static;
        max-height: none;
      }
      
      .type-tabs {
        flex-direction: row;
        flex-wrap: wrap;
      }
      
      .type-tab {
        flex: 1;
        min-width: 120px;
      }
    }
    
    @media (max-width: 600px) {
      .card-header {
        flex-direction: column;
        text-align: center;
      }
      
      .card-meta {
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }
      
      .card-actions {
        flex-direction: column;
      }
      
      .search-panel {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main>
    <div class="container">
      <!-- Layout com sidebar e feed -->
      <div class="store-layout">
        <!-- Sidebar de filtros -->
        <aside class="filters-sidebar">
          <!-- Abas estilo fichário -->
          <div class="filter-section">
            <h3>📁 Categorias</h3>
            <div class="type-tabs">
              <div class="type-tab active" onclick="filterByType('all')" id="tabAll">
                <i>📋</i> Todos
                <span class="count" id="countAll">0</span>
              </div>
              <div class="type-tab" onclick="filterByType('model')" id="tabModels">
                <i>🤖</i> Modelos
                <span class="count" id="countModels">0</span>
              </div>
              <div class="type-tab" onclick="filterByType('professional')" id="tabProfessionals">
                <i>👤</i> Profissionais
                <span class="count" id="countProfessionals">0</span>
              </div>
            </div>
          </div>
          
          <!-- Tags selecionadas (aparecem quando há tags ativas) -->
          <div class="filter-section" id="activeTagsSection" style="display: none;">
            <h3>🏷️ Filtros ativos</h3>
            <div class="tags-container" id="activeTags"></div>
            <button class="btn-outline" style="width: 100%;" onclick="clearAllTags()">Limpar todos</button>
          </div>
        </aside>
        
        <!-- Feed de conteúdo -->
        <div class="feed-container" id="feedContainer">
          <!-- Loading skeleton -->
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
            <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
            <div class="skeleton-line" style="width: 70%;"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
            <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
            <div class="skeleton-line" style="width: 70%;"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Botão flutuante de pesquisa -->
  <div class="search-float-btn" onclick="openSearch()">
    🔍
  </div>

  <!-- Overlay de pesquisa -->
  <div class="search-overlay" id="searchOverlay" onclick="closeSearchOnClickOutside(event)">
    <div class="search-panel" onclick="event.stopPropagation()">
      <div class="search-header">
        <h2>Pesquisar</h2>
        <button class="close-search" onclick="closeSearch()">✕</button>
      </div>
      
      <div class="search-input-wrapper">
        <i>🔍</i>
        <input type="text" id="searchInput" placeholder="O que você procura?" oninput="updateSearch()">
      </div>
      
      <div class="tags-title">
        <span>Tags populares</span>
      </div>
      <div class="tags-container" id="tagsCloud">
        <!-- Tags serão inseridas via JS -->
      </div>
      
      <div class="tags-title">
        <span>Adicionar tag personalizada</span>
      </div>
      <div class="add-tag">
        <input type="text" id="newTagInput" placeholder="Ex: chatbot, visão computacional...">
        <button onclick="addCustomTag()">Adicionar</button>
      </div>
      
      <div class="search-actions">
        <button class="btn-primary" onclick="applySearch()">Aplicar filtros</button>
        <button class="btn-outline" onclick="clearSearch()">Limpar</button>
      </div>
    </div>
  </div>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row">
      <label>Conta</label>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  
  <script>
    // ===== VARIÁVEIS GLOBAIS =====
    let allItems = [];
    let filteredItems = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let selectedTags = [];
    
    // ===== FUNÇÕES DE CARREGAMENTO =====
    async function loadAllItems() {
      console.log('Carregando itens para o feed...');
      
      // Mostrar skeleton
      showSkeleton();
      
      try {
        // Carregar modelos do localStorage (APENAS os publicados)
        const models = JSON.parse(localStorage.getItem('models') || '[]');
        
        // Carregar profissionais do localStorage (APENAS os publicados)
        const professionals = JSON.parse(localStorage.getItem('professionals') || '[]');
        
        // Converter modelos para formato do feed
        const modelItems = models.map(model => ({
          id: model.id,
          type: 'model',
          title: model.title,
          name: model.seller || 'Vendedor',
          description: model.description,
          image: model.image,
          price: model.price,
          seller: model.seller,
          rating: 4.5,
          projects: Math.floor(Math.random() * 50) + 10,
          tags: extractTagsFromModel(model),
          avatar: model.image,
          createdAt: model.createdAt || new Date().toISOString()
        }));
        
        // Converter profissionais para formato do feed
        const professionalItems = professionals.map(prof => ({
          id: prof.id,
          type: 'professional',
          title: prof.name,
          name: prof.name,
          specialty: prof.specialty,
          description: prof.bio || `${prof.name} é especialista em ${prof.specialty}`,
          image: prof.avatar,
          rating: prof.rating || 5.0,
          projects: prof.projects || 0,
          hourlyRate: prof.hourlyRate,
          tags: extractTagsFromProfessional(prof),
          avatar: prof.avatar,
          createdAt: prof.createdAt || new Date().toISOString()
        }));
        
        // Combinar e ordenar por data de criação (mais recentes primeiro)
        allItems = [...modelItems, ...professionalItems].sort((a, b) => 
          new Date(b.createdAt) - new Date(a.createdAt)
        );
        
        console.log(`Carregados ${allItems.length} itens (${modelItems.length} modelos, ${professionalItems.length} profissionais)`);
        
        // Atualizar contadores
        updateCounts(modelItems.length, professionalItems.length);
        
        // Renderizar tags
        renderTags();
        
        // Aplicar filtros iniciais
        filterItems();
        
      } catch (error) {
        console.error('Erro ao carregar itens:', error);
        showEmptyState('Erro ao carregar dados');
      }
    }
    
    function extractTagsFromModel(model) {
      const tags = [];
      if (model.category) tags.push(model.category);
      if (model.title) {
        if (model.title.toLowerCase().includes('atendimento')) tags.push('atendimento');
        if (model.title.toLowerCase().includes('chat')) tags.push('chatbot');
        if (model.title.toLowerCase().includes('analise') || model.title.toLowerCase().includes('análise')) tags.push('análise');
        if (model.title.toLowerCase().includes('visão') || model.title.toLowerCase().includes('visao')) tags.push('visão computacional');
      }
      return [...new Set(tags)].slice(0, 3);
    }
    
    function extractTagsFromProfessional(prof) {
      const tags = [prof.specialty];
      if (prof.services) tags.push(...prof.services);
      return [...new Set(tags)].slice(0, 3);
    }
    
    function updateCounts(modelsCount, professionalsCount) {
      document.getElementById('countAll').textContent = allItems.length;
      document.getElementById('countModels').textContent = modelsCount;
      document.getElementById('countProfessionals').textContent = professionalsCount;
    }
    
    function showSkeleton() {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      let skeletonHTML = '';
      for (let i = 0; i < 3; i++) {
        skeletonHTML += `
          <div class="skeleton-card">
            <div class="skeleton-line" style="width: 60%; height: 30px;"></div>
            <div class="skeleton-line" style="width: 90%; height: 200px; margin: 1rem 0;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
            <div class="skeleton-line" style="width: 70%;"></div>
          </div>
        `;
      }
      container.innerHTML = skeletonHTML;
    }
    
    function showEmptyState(message = 'Nenhum item encontrado') {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      container.innerHTML = `
        <div class="empty-feed">
          <i>🔍</i>
          <h3>Ops! Nada por aqui</h3>
          <p>${message}. Tente outros filtros ou publique algo novo!</p>
          <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="cta" onclick="filterByType('all')">Ver todos</button>
            <a href="publicar-modelo.html" class="cta outline">Publicar modelo</a>
          </div>
        </div>
      `;
    }
    
    // ===== FUNÇÕES DE PESQUISA =====
    window.openSearch = function() {
      document.getElementById('searchOverlay').classList.add('active');
      document.getElementById('searchInput').focus();
    };
    
    window.closeSearch = function() {
      document.getElementById('searchOverlay').classList.remove('active');
    };
    
    window.closeSearchOnClickOutside = function(event) {
      if (event.target.classList.contains('search-overlay')) {
        closeSearch();
      }
    };
    
    window.updateSearch = function() {
      currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
      applySearch();
    };
    
    window.applySearch = function() {
      filterItems();
      closeSearch();
    };
    
    window.clearSearch = function() {
      document.getElementById('searchInput').value = '';
      currentSearch = '';
      selectedTags = [];
      renderTags();
      filterItems();
      closeSearch();
    };
    
    // ===== FUNÇÕES DE TAGS =====
    function renderTags() {
      const container = document.getElementById('tagsCloud');
      if (!container) return;
      
      // Coletar todas as tags únicas dos itens
      const allTags = new Set();
      allItems.forEach(item => {
        item.tags.forEach(tag => allTags.add(tag));
      });
      
      // Adicionar tags comuns
      const commonTags = ['chatbot', 'atendimento', 'visão computacional', 'nlp', 'análise', 'generativo'];
      commonTags.forEach(tag => allTags.add(tag));
      
      // Converter para array e ordenar
      const tagsArray = Array.from(allTags).sort();
      
      container.innerHTML = '';
      
      tagsArray.forEach(tag => {
        const tagEl = document.createElement('span');
        tagEl.className = `tag-item ${selectedTags.includes(tag) ? 'active' : ''}`;
        tagEl.textContent = tag;
        tagEl.onclick = () => toggleTag(tag);
        container.appendChild(tagEl);
      });
    }
    
    window.toggleTag = function(tag) {
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
      } else {
        selectedTags.push(tag);
      }
      
      // Atualizar visual das tags
      document.querySelectorAll('.tag-item').forEach(el => {
        if (selectedTags.includes(el.textContent)) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });
      
      // Mostrar/esconder seção de tags ativas
      updateActiveTagsSection();
      
      filterItems();
    };
    
    window.addCustomTag = function() {
      const input = document.getElementById('newTagInput');
      const newTag = input.value.trim().toLowerCase();
      
      if (newTag && !selectedTags.includes(newTag)) {
        selectedTags.push(newTag);
        
        // Adicionar à nuvem de tags
        const container = document.getElementById('tagsCloud');
        const tagEl = document.createElement('span');
        tagEl.className = 'tag-item active';
        tagEl.textContent = newTag;
        tagEl.onclick = () => toggleTag(newTag);
        container.appendChild(tagEl);
        
        input.value = '';
        
        updateActiveTagsSection();
        filterItems();
      }
    };
    
    function updateActiveTagsSection() {
      const section = document.getElementById('activeTagsSection');
      const container = document.getElementById('activeTags');
      
      if (selectedTags.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      container.innerHTML = '';
      
      selectedTags.forEach(tag => {
        const tagEl = document.createElement('span');
        tagEl.className = 'tag-item active';
        tagEl.innerHTML = `${tag} <span style="margin-left:0.3rem; font-size:0.8rem;" onclick="removeTag('${tag}')">✕</span>`;
        container.appendChild(tagEl);
      });
    }
    
    window.removeTag = function(tag) {
      selectedTags = selectedTags.filter(t => t !== tag);
      
      // Atualizar visual na nuvem de tags
      document.querySelectorAll('.tag-item').forEach(el => {
        if (el.textContent === tag || el.textContent.startsWith(tag + ' ')) {
          el.classList.remove('active');
        }
      });
      
      updateActiveTagsSection();
      filterItems();
    };
    
    window.clearAllTags = function() {
      selectedTags = [];
      
      document.querySelectorAll('.tag-item').forEach(el => {
        el.classList.remove('active');
      });
      
      updateActiveTagsSection();
      filterItems();
    };
    
    // ===== FUNÇÕES DE FILTRO =====
    window.filterByType = function(type) {
      currentFilter = type;
      
      // Atualizar abas
      document.getElementById('tabAll').classList.toggle('active', type === 'all');
      document.getElementById('tabModels').classList.toggle('active', type === 'model');
      document.getElementById('tabProfessionals').classList.toggle('active', type === 'professional');
      
      filterItems();
    };
    
    function filterItems() {
      filteredItems = allItems.filter(item => {
        // Filtro por tipo
        if (currentFilter !== 'all' && item.type !== currentFilter) {
          return false;
        }
        
        // Filtro por tags
        if (selectedTags.length > 0) {
          const hasTag = selectedTags.some(tag => 
            item.tags.some(itemTag => itemTag.toLowerCase().includes(tag.toLowerCase()))
          );
          if (!hasTag) return false;
        }
        
        // Filtro por pesquisa
        if (currentSearch) {
          const searchableText = `
            ${item.title} ${item.name} ${item.description} ${item.tags.join(' ')}
          `.toLowerCase();
          
          return searchableText.includes(currentSearch);
        }
        
        return true;
      });
      
      renderItems(filteredItems);
    }
    
    // ===== FUNÇÕES DE RENDERIZAÇÃO =====
    function renderItems(items) {
      const container = document.getElementById('feedContainer');
      if (!container) return;
      
      if (items.length === 0) {
        showEmptyState('Nenhum item corresponde aos filtros');
        return;
      }
      
      container.innerHTML = '';
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.onclick = () => abrirItem(item);
        
        if (item.type === 'model') {
          card.innerHTML = renderModelCard(item);
        } else {
          card.innerHTML = renderProfessionalCard(item);
        }
        
        container.appendChild(card);
      });
    }
    
    function renderModelCard(model) {
      const imageStyle = model.image ? `background-image: url('${model.image}')` : 'background: linear-gradient(135deg, var(--accent), #4ade80)';
      const avatarInitial = model.name ? model.name.charAt(0).toUpperCase() : 'M';
      
      return `
        <div class="card-header">
          <div class="card-avatar" style="${model.image ? `background-image: url('${model.image}'); background-size: cover;` : ''}">
            ${!model.image ? avatarInitial : ''}
          </div>
          <div class="card-author">
            <h3>${model.name}</h3>
            <div class="card-type">
              <span class="card-type-icon"></span>
              Modelo de IA
            </div>
          </div>
        </div>
        <div class="card-image" style="${imageStyle}"></div>
        <div class="card-content">
          <h2 class="card-title">${model.title}</h2>
          <p class="card-description">${model.description.substring(0, 150)}${model.description.length > 150 ? '...' : ''}</p>
          
          <div class="card-meta">
            <div class="card-meta-item">
              <span>💰</span> ${model.price || 'Consultar'}
            </div>
            <div class="card-meta-item">
              <span>⭐</span> ${model.rating.toFixed(1)}
            </div>
            <div class="card-meta-item">
              <span>📊</span> ${model.projects} vendas
            </div>
          </div>
          
          <div class="card-tags">
            ${model.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
          </div>
          
          <div class="card-actions">
            <button class="card-btn primary" onclick="event.stopPropagation(); window.location.href='model.html?id=${model.id}'">Ver detalhes</button>
            <button class="card-btn outline" onclick="event.stopPropagation(); alert('Contatar vendedor')">📧 Contatar</button>
          </div>
        </div>
      `;
    }
    
    function renderProfessionalCard(prof) {
      const imageStyle = prof.image ? `background-image: url('${prof.image}')` : 'background: linear-gradient(135deg, #ff6b6b, #feca57)';
      const avatarInitial = prof.name ? prof.name.charAt(0).toUpperCase() : 'P';
      
      return `
        <div class="card-header">
          <div class="card-avatar professional" style="${prof.image ? `background-image: url('${prof.image}'); background-size: cover;` : ''}">
            ${!prof.image ? avatarInitial : ''}
          </div>
          <div class="card-author">
            <h3>${prof.name}</h3>
            <div class="card-type">
              <span class="card-type-icon professional"></span>
              Profissional
            </div>
          </div>
        </div>
        <div class="card-image" style="${imageStyle}"></div>
        <div class="card-content">
          <h2 class="card-title">${prof.specialty || 'Especialista'}</h2>
          <p class="card-description">${prof.description.substring(0, 150)}${prof.description.length > 150 ? '...' : ''}</p>
          
          <div class="card-meta">
            <div class="card-meta-item">
              <span>⏱️</span> ${prof.hourlyRate ? `R$ ${prof.hourlyRate}/h` : 'Consultar'}
            </div>
            <div class="card-meta-item">
              <span>⭐</span> ${prof.rating.toFixed(1)}
            </div>
            <div class="card-meta-item">
              <span>📁</span> ${prof.projects} projetos
            </div>
          </div>
          
          <div class="card-tags">
            ${prof.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
          </div>
          
          <div class="card-actions">
            <button class="card-btn primary" onclick="event.stopPropagation(); window.location.href='professional.html?id=${prof.id}'">Ver perfil</button>
            <button class="card-btn outline" onclick="event.stopPropagation(); alert('Contatar profissional')">📧 Contatar</button>
          </div>
        </div>
      `;
    }
    
    function abrirItem(item) {
      if (item.type === 'model') {
        window.location.href = `model.html?id=${item.id}`;
      } else {
        window.location.href = `professional.html?id=${item.id}`;
      }
    }
    
    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
      loadAllItems();
    });
  </script>
</body>
</html>
