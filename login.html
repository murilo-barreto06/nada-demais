<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Login</title>
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--muted);
      margin: 1.5rem 0;
    }
    
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(128,128,128,0.2);
    }
    
    .login-divider span {
      padding: 0 1rem;
    }
    
    .google-btn-container {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    
    .error-message {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-container">
      <h2>Entrar</h2>
      
      <!-- Mensagem de erro -->
      <div id="loginError" class="error-message"></div>
      
      <!-- Formulário de login -->
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Senha" required />
        
        <button type="submit" class="hero-btn">Entrar</button>
      </form>
      
      <div class="login-divider">
        <span>ou</span>
      </div>
      
      <!-- Botão do Google -->
      <div class="google-btn-container">
        <div id="g_id_onload"
             data-client_id="403584715171-6deavg3parn356t386htibjstjl4nt25.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
      </div>
      
      <p>Não tem conta? <a href="criar-conta.html">Criar conta</a></p>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row"> <!-- ADICIONE ESTA CLASSE -->
      <label>Conta</label>
      <!-- O conteúdo será preenchido dinamicamente pelo auth.js -->
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        await SupaDB.Auth.signIn(email, password);
        window.location.href = 'buyer-dashboard.html';
      } catch (err) {
        showError('Email ou senha incorretos.');
      }
    });

    // Google OAuth — botão do Google Identity Services redireciona via Supabase OAuth
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.querySelector('.google-btn-container');
      if (googleBtn) {
        googleBtn.innerHTML = '<button onclick="SupaDB.Auth.signInWithGoogle()" style="display:flex;align-items:center;gap:.7rem;padding:.75rem 1.5rem;border:1px solid rgba(128,128,128,.3);border-radius:40px;background:var(--panel);color:var(--text);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;justify-content:center;" onmouseover="this.style.background='rgba(128,128,128,.08)'" onmouseout="this.style.background='var(--panel)'"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>Entrar com Google</button>';
      }
    });
  </script>
  <script src="auth.js"></script>
  <script>
    // Garantir que o link "Entrar" fique ativo na página de login
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        const loginLink = document.querySelector('.login-link');
        if (loginLink) {
          loginLink.classList.add('active');
        }
      }, 100);
    });
  </script>
  <script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
