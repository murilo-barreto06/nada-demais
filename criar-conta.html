<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Criar Conta</title>
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--muted);
      margin: 1.5rem 0;
    }
    
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(128,128,128,0.2);
    }
    
    .login-divider span {
      padding: 0 1rem;
    }
    
    .google-btn-container {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    
    .error-message {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .success-message {
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-container">
      <h2>Criar Conta</h2>
      
      <!-- Mensagens de erro/sucesso -->
      <div id="registerError" class="error-message"></div>
      <div id="registerSuccess" class="success-message"></div>
      
      <!-- Formulário de cadastro -->
      <form id="registerForm">
        <input type="text" id="registerName" placeholder="Nome completo" required />
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Senha" required minlength="6" />
        <input type="password" id="registerConfirmPassword" placeholder="Confirmar senha" required />
        
        <button type="submit" class="hero-btn">Criar conta</button>
      </form>
      
      <div class="login-divider">
        <span>ou</span>
      </div>
      
      <!-- Botão do Google -->
      <div class="google-btn-container">
        <div id="g_id_onload"
             data-client_id="403584715171-6deavg3parn356t386htibjstjl4nt25.apps.googleusercontent.com"
             data-context="signup"
             data-ux_mode="popup"
             data-callback="handleGoogleRegister"
             data-auto_prompt="false">
        </div>
        
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
      </div>
      
      <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row"> <!-- ADICIONE ESTA CLASSE -->
      <label>Conta</label>
      <!-- O conteúdo será preenchido dinamicamente pelo auth.js -->
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
  <script>
    // ===== FUNÇÕES DE CADASTRO =====
    
    // Chave para armazenar usuários no localStorage
    const USERS_KEY = 'ai_store_users';
    
    // Carregar usuários existentes
    function getUsers() {
      return JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    }
    
    // Salvar usuários
    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }
    
    // Mostrar erro
    function showError(message) {
      const errorEl = document.getElementById('registerError');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      
      // Esconder após 3 segundos
      setTimeout(() => {
        errorEl.classList.remove('show');
      }, 3000);
    }
    
    // Mostrar sucesso
    function showSuccess(message) {
      const successEl = document.getElementById('registerSuccess');
      successEl.textContent = message;
      successEl.classList.add('show');
      
      // Redirecionar após 1.5 segundos
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }
    
    // Validar email
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    
    // Registrar com email/senha
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      
      // Validações
      if (!name || !email || !password) {
        showError('Todos os campos são obrigatórios');
        return;
      }
      
      if (!isValidEmail(email)) {
        showError('Email inválido');
        return;
      }
      
      if (password.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('As senhas não coincidem');
        return;
      }
      
      // Verificar se email já existe
      const users = getUsers();
      const existingUser = users.find(u => u.email === email);
      
      if (existingUser) {
        showError('Este email já está cadastrado');
        return;
      }
      
      // Criar novo usuário
      const newUser = {
        id: Date.now(),
        name: name,
        email: email,
        password: btoa(password), // Base64 (apenas para demonstração)
        createdAt: new Date().toISOString(),
        authType: 'email'
      };
      
      users.push(newUser);
      saveUsers(users);
      
      showSuccess('Conta criada com sucesso! Redirecionando...');
    });
    
    // ===== REGISTRO COM GOOGLE =====
    window.handleGoogleRegister = function(response) {
      // Decodificar o token JWT do Google
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      
      const email = payload.email;
      const name = payload.name;
      const googleId = payload.sub;
      
      // Verificar se já existe
      const users = getUsers();
      let user = users.find(u => u.email === email);
      
      if (user) {
        // Usuário já existe - fazer login direto
        localStorage.setItem('currentUser', JSON.stringify({
          id: user.id,
          name: user.name,
          email: user.email,
          authType: 'google'
        }));
        
        showSuccess('Login realizado! Redirecionando...');
        setTimeout(() => {
          window.location.href = 'buyer-dashboard.html';
        }, 1500);
        
      } else {
        // Criar novo usuário com dados do Google
        const newUser = {
          id: Date.now(),
          name: name,
          email: email,
          googleId: googleId,
          createdAt: new Date().toISOString(),
          authType: 'google'
        };
        
        users.push(newUser);
        saveUsers(users);
        
        // Fazer login automático
        localStorage.setItem('currentUser', JSON.stringify({
          id: newUser.id,
          name: newUser.name,
          email: newUser.email,
          authType: 'google'
        }));
        
        showSuccess('Conta criada com sucesso! Redirecionando...');
        setTimeout(() => {
          window.location.href = 'buyer-dashboard.html';
        }, 1500);
      }
    };
    
    // Configurar botão do Google (opcional)
    window.onload = function() {
      // O botão já é renderizado automaticamente pelo script
    };
  </script>
  <script src="auth.js"></script>
</body>
</html>
