<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Criar Conta</title>
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--muted);
      margin: 1.5rem 0;
    }
    
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(128,128,128,0.2);
    }
    
    .login-divider span {
      padding: 0 1rem;
    }
    
    .google-btn-container {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    
    .error-message {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .success-message {
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    
    .success-message.show {
      display: block;
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <div id="auth-container" style="display: inline-block;"></div>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-container">
      <h2>Criar Conta</h2>
      
      <!-- Mensagens de erro/sucesso -->
      <div id="registerError" class="error-message"></div>
      <div id="registerSuccess" class="success-message"></div>
      
      <!-- Formulário de cadastro -->
      <form id="registerForm">
        <input type="text" id="registerName" placeholder="Nome completo" required />
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Senha" required minlength="6" />
        <input type="password" id="registerConfirmPassword" placeholder="Confirmar senha" required />
        
        <button type="submit" class="hero-btn">Criar conta</button>
      </form>
      
      <div class="login-divider">
        <span>ou</span>
      </div>
      
      <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row account-row"> <!-- ADICIONE ESTA CLASSE -->
      <label>Conta</label>
      <!-- O conteúdo será preenchido dinamicamente pelo auth.js -->
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    // ===== CADASTRO VIA SUPABASE =====

    function showError(msg) {
      const el = document.getElementById('registerError');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }
    function showSuccess(msg) {
      const el = document.getElementById('registerSuccess');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => window.location.href = 'login.html', 1500);
    }

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name            = document.getElementById('registerName').value.trim();
      const email           = document.getElementById('registerEmail').value.trim();
      const password        = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

      if (!name || !email || !password) { showError('Todos os campos são obrigatórios'); return; }
      if (password.length < 6)          { showError('Senha com mínimo 6 caracteres'); return; }
      if (password !== confirmPassword)  { showError('As senhas não coincidem'); return; }

      try {
        await SupaDB.Auth.signUp(email, password, name);
        showSuccess('Conta criada! Verifique seu email e faça login.');
      } catch(err) {
        showError(err.message || 'Erro ao criar conta.');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.querySelector('.google-btn-container');
      if (googleBtn) {
        googleBtn.innerHTML = '<button onclick="SupaDB.Auth.signInWithGoogle()" style="display:flex;align-items:center;gap:.7rem;padding:.75rem 1.5rem;border:1px solid rgba(128,128,128,.3);border-radius:40px;background:var(--panel);color:var(--text);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;justify-content:center;" onmouseover="this.style.background=\'rgba(128,128,128,.08)\'" onmouseout="this.style.background=\'var(--panel)\'"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>Cadastrar com Google</button>';
      }
    });
  </script>
  <script src="auth.js"></script>
  <script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
