<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Minhas IAs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="buyer-dashboard.html" class="active">Minhas IAs</a>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Minhas IAs</h1>
    <p>Modelos que você adquiriu.</p>

    <div class="card-grid">
      <div class="small-card">
        <h3>IA Atendimento</h3>
        <button class="hero-btn" onclick="alert('Abrir documentação')">Abrir documentação</button>
      </div>
      <div class="small-card">
        <h3>IA Recomendador</h3>
        <button class="hero-btn" onclick="alert('Abrir documentação')">Abrir documentação</button>
      </div>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <h3>Configurações</h3>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row">
      <label>Conta</label>
      <a href="login.html" class="small-btn">Entrar / Cadastrar</a>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
