<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Loja</title>
  
  <!-- SCRIPT CRÍTICO ANTES DO CSS - PREVINE FLASH -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Loja</a>
      <a href="anuncie.html">Anuncie</a>
      <a href="login.html">Entrar</a>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main>
    <!-- CARROSSEL DE MODELOS -->
    <section class="carousel-section">
      <div class="container">
        <h2>Modelos disponíveis</h2>
        <div class="carousel-wrapper">
          <button class="carousel-btn left" onclick="prevSlideModels()">‹</button>
          <div class="carousel" id="modelsCarousel"></div>
          <button class="carousel-btn right" onclick="nextSlideModels()">›</button>
        </div>
      </div>
    </section>

    <!-- CARROSSEL DE PROFISSIONAIS - APENAS CRIADOS -->
    <section class="carousel-section professionals">
      <div class="container">
        <h2>Profissionais em Destaque</h2>
        <div class="carousel-wrapper">
          <button class="carousel-btn left" onclick="prevSlideProfessionals()">‹</button>
          <div class="carousel" id="professionalsCarousel"></div>
          <button class="carousel-btn right" onclick="nextSlideProfessionals()">›</button>
        </div>
      </div>
    </section>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row">
      <label>Conta</label>
      <a href="login.html" class="small-btn">Entrar / Cadastrar</a>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
