<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Home</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="anuncie.html" >Anuncie</a>
      <a href="login.html" class="active">Entrar</a>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-container">
      <h2>Entrar</h2>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Senha" />
      <button class="hero-btn" onclick="mockLogin()">Entrar (mock)</button>
      <p>Não tem conta? <a href="#">Criar conta</a></p>
    </div>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row">
      <label>Conta</label>
      <a href="login.html" class="small-btn">Entrar / Cadastrar</a>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
