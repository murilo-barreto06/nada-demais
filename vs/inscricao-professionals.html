<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Store — Cadastro de Profissional</title>
  
  <!-- SCRIPT CRÍTICO ANTES DO CSS - PREVINE FLASH -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">AI Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="store.html">Loja</a>
      <a href="anuncie.html" class="active">Anuncie</a>
      <a href="login.html">Entrar</a>
      <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙</button>
    </nav>
  </header>

  <main>
    <section class="form-page">
      <div class="container">
        <div class="form-container">
          <h1>Cadastro de Profissional</h1>
          <p class="form-subtitle">Preencha seus dados para aparecer no carrossel de profissionais da loja</p>
          
          <form id="professionalForm" class="professional-form">
            <!-- Nome -->
            <div class="form-group">
              <label for="name">Nome completo *</label>
              <input type="text" id="name" name="name" required placeholder="Seu nome completo">
            </div>
            
            <!-- Especialidade -->
            <div class="form-group">
              <label for="specialty">Especialidade *</label>
              <input type="text" id="specialty" name="specialty" required placeholder="Ex: NLP, Visão Computacional, etc">
            </div>
            
            <!-- Avatar (URL da imagem) -->
            <div class="form-group">
              <label for="avatar">URL da foto (opcional)</label>
              <input type="url" id="avatar" name="avatar" placeholder="https://exemplo.com/minha-foto.jpg">
              <small>Deixe em branco para usar iniciais</small>
            </div>
            
            <!-- Avaliação -->
            <div class="form-group">
              <label for="rating">Avaliação (0 a 5) *</label>
              <input type="number" id="rating" name="rating" min="0" max="5" step="0.1" required placeholder="4.8">
            </div>
            
            <!-- Projetos -->
            <div class="form-group">
              <label for="projects">Número de projetos realizados *</label>
              <input type="number" id="projects" name="projects" min="0" required placeholder="12">
            </div>
            
            <!-- Biografia -->
            <div class="form-group">
              <label for="bio">Biografia / Descrição *</label>
              <textarea id="bio" name="bio" rows="4" required placeholder="Conte um pouco sobre sua experiência..."></textarea>
            </div>
            
            <!-- Serviços (múltiplos) -->
            <div class="form-group">
              <label>Serviços oferecidos *</label>
              <div class="checkbox-group">
                <label><input type="checkbox" name="services" value="Instalação"> Instalação</label>
                <label><input type="checkbox" name="services" value="Treinamento"> Treinamento</label>
                <label><input type="checkbox" name="services" value="Customização"> Customização</label>
                <label><input type="checkbox" name="services" value="Suporte"> Suporte</label>
                <label><input type="checkbox" name="services" value="Consultoria"> Consultoria</label>
                <label><input type="checkbox" name="services" value="Implementação"> Implementação</label>
              </div>
              <input type="text" id="otherServices" placeholder="Outros (separados por vírgula)">
            </div>
            
            <!-- Valor por hora -->
            <div class="form-group">
              <label for="hourlyRate">Valor por hora (R$) *</label>
              <input type="number" id="hourlyRate" name="hourlyRate" min="0" step="10" required placeholder="150">
            </div>
            
            <!-- Modelos (IDs) -->
            <div class="form-group">
              <label for="portfolio">IDs dos modelos que criou (opcional)</label>
              <input type="text" id="portfolio" name="portfolio" placeholder="Ex: 1,3,5 (separados por vírgula)">
              <small>Consulte os IDs na página de modelos</small>
            </div>
            
            <div class="form-actions">
              <button type="submit" class="cta">Cadastrar profissional</button>
              <button type="button" class="cta outline" onclick="goBack()">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>Configurações</h3>
      <button class="icon-btn" onclick="toggleSettings()">⚙</button>
    </div>
    <div class="settings-row">
      <label>Tema</label>
      <button onclick="toggleTheme()" class="small-btn">Alternar</button>
    </div>
    <div class="settings-row">
      <label>Conta</label>
      <a href="login.html" class="small-btn">Entrar / Cadastrar</a>
    </div>
    <button class="small-btn" onclick="toggleSettings()">Fechar</button>
  </div>

  <footer>
    <p>AI Store — protótipo • © 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
