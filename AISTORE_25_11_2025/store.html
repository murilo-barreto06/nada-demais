<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AI Store - Modelos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<header>
    <h1 onclick="location.href='index.html'">AI Store</h1>

    <div class="nav-buttons">
        <a href="index.html">Home</a>
        <a href="#" onclick="openSettings()">Configurações</a>
    </div>
</header>

<div class="carousel-container">

    <div class="arrow" onclick="moveCarousel(-1)">&#9664;</div>

    <div class="carousel">

        <div class="card" onclick="location.href='model.html'">
            <div class="card-title">IA generativa ideal</div>
            <div class="card-desc">descrição breve</div>
            <div class="card-img"></div>
        </div>

        <div class="card" onclick="location.href='model.html'">
            <div class="card-title">IA atendimento</div>
            <div class="card-desc">descrição breve</div>
            <div class="card-img"></div>
        </div>

        <div class="card" onclick="location.href='model.html'">
            <div class="card-title">IA organização</div>
            <div class="card-desc">descrição breve</div>
            <div class="card-img"></div>
        </div>

    </div>

    <div class="arrow" onclick="moveCarousel(1)">&#9654;</div>

</div>

<div id="settingsPanel">
    <h2>Configurações</h2>
    <div class="settings-btn" onclick="toggleTheme()">Alternar Tema</div>
    <div class="settings-btn" onclick="closeSettings()">Fechar</div>
</div>

<script src="script.js"></script>
</body>
</html>
