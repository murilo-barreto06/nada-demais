<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Store</title>

    <style>
        :root {
            --bg: #0e161c;
            --card: #5c5c5c;
            --header: #3c3c3c;
            --text: white;
            --button: #dcdcdc;
            --button-hover: #bcbcbc;
        }

        /* Tema claro */
        body.light {
            --bg: #f4f4f4;
            --card: #e2e2e2;
            --header: #d3d3d3;
            --text: #222;
            --button: #c2c2c2;
            --button-hover: #a8a8a8;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: Arial, Helvetica, sans-serif;
            transition: 0.3s;
        }

        header {
            background: var(--header);
            color: var(--text);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--text);
            font-size: 18px;
            padding: 5px 10px;
            background: #5e5e5e;
            border-radius: 4px;
        }

        nav a:hover {
            opacity: 0.8;
        }

        /* Botão de tema */
        #toggle-theme {
            padding: 6px 12px;
            background: var(--button);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 20px;
        }

        .carousel-container {
            margin: 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            padding: 20px;
        }

        .carousel {
            display: flex;
            gap: 20px;
            overflow: hidden;
            width: 750px;
        }

        .card {
            background: var(--card);
            width: 230px;
            padding-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            cursor: pointer;
        }

        .card .img {
            width: 100%;
            height: 120px;
            background: linear-gradient(#b3e3ff, #8bd3ff, #7ccc20);
            border-radius: 4px 4px 0 0;
        }

        .card p {
            padding: 15px;
            font-weight: bold;
            color: var(--text);
        }

        .arrow {
            background: var(--button);
            border: none;
            width: 50px;
            height: 50px;
            font-size: 25px;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 20px;
        }

        .arrow:hover {
            background: var(--button-hover);
        }

        /* Responsividade */
        @media (max-width: 820px) {
            .carousel {
                width: 90%;
            }
        }

        @media (max-width: 600px) {
            .arrow {
                display: none;
            }

            .carousel {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Documentações</a>
            <a href="#">Anuncie</a>

            <button id="toggle-theme">Tema</button>
        </nav>
    </header>

    <section class="carousel-container">
        <button class="arrow left">&#8592;</button>

        <div class="carousel" id="carousel">
            <!-- Cards gerados via JavaScript -->
        </div>

        <button class="arrow right">&#8594;</button>
    </section>

    <script>
        /*
            JSON com modelos de IA – você pode depois carregar isso de um banco
        */
        const modelos = [
            { nome: "IA generativa ideal para negócios" },
            { nome: "IA de atender clientes" },
            { nome: "IA de planner para organização" },
            { nome: "IA para vendas" },
            { nome: "IA para RH" },
            { nome: "IA para análise financeira" },
        ];

        const carousel = document.getElementById("carousel");

        // Renderizar cards dinamicamente
        function renderCards() {
            modelos.forEach(m => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="img"></div>
                    <p>${m.nome}</p>
                `;
                carousel.appendChild(card);
            });
        }

        renderCards();

        // Carrossel funcional
        let scrollAmount = 0;
        const scrollStep = 250;

        document.querySelector(".left").onclick = () => {
            carousel.scrollBy({ left: -scrollStep, behavior: "smooth" });
        };

        document.querySelector(".right").onclick = () => {
            carousel.scrollBy({ left: scrollStep, behavior: "smooth" });
        };

        // Tema claro/escuro
        const btnTema = document.getElementById("toggle-theme");
        btnTema.onclick = () => {
            document.body.classList.toggle("light");
        };
    </script>

</body>
</html>
